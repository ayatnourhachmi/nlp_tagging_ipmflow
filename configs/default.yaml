# IPM Flow tagging benchmark — default experiment settings

split:
  test_size: 0.2
  random_state: 42
  stratify_on: objective

model_c:
  max_features: 5000
  C: 5.0
  max_iter: 1000
  ngram_range: [1, 1]
  sublinear_tf: true
  stop_words: english
  min_df: 1

model_d:
  model_name: distilbert-base-uncased
  max_len: 128
  batch_size: 16
  epochs: 20
  lr: 2.0e-5
  warmup_ratio: 0.1
  dropout: 0.2
  weight_decay: 0.01
  val_ratio: 0.15
  early_stopping_patience: 4
